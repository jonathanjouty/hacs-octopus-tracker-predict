name: Recalibrate Defaults

on:
  schedule:
    # Run quarterly: 1st of Jan, Apr, Jul, Oct at 06:00 UTC
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  recalibrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run recalibration
        run: python scripts/recalibrate.py --update-const

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet custom_components/tracker_predict/const.py && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated defaults
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="recalibrate/$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add custom_components/tracker_predict/const.py
          git commit -m "chore: recalibrate per-region defaults $(date +%Y-%m)"
          git push -u origin "$BRANCH"
          PR_BODY="## Summary
          Automated quarterly recalibration of per-region default slope/intercept values
          in \`const.py\`, computed from the latest 90 days of Octopus API data.

          Generated by the \`recalibrate\` workflow."

          gh pr create \
            --base main \
            --title "Recalibrate per-region defaults ($(date +'%B %Y'))" \
            --body "$PR_BODY"

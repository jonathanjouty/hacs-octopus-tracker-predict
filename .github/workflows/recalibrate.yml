name: Recalibrate Defaults

on:
  schedule:
    # Run weekly: every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# A single long-lived branch/PR that always reflects everything not yet on
# main. Reusing one branch means there is only ever one open recalibration PR
# to review and merge — no backlog of stale PRs, and no lost history snapshots.
env:
  ROLLING_BRANCH: recalibrate/auto

jobs:
  recalibrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Seed accumulated history from rolling branch
        run: |
          # Union-merge the history already accumulated on the rolling branch
          # with main's, so snapshots from previous (unmerged) runs are never
          # lost when this run regenerates the file.
          if git ls-remote --exit-code --heads origin "$ROLLING_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$ROLLING_BRANCH"
            git show "origin/$ROLLING_BRANCH:calibration_history.json" > /tmp/rolling_history.json 2>/dev/null || true
            if [ -s /tmp/rolling_history.json ]; then
              python - <<'PY'
          import json, pathlib
          main_p = pathlib.Path("calibration_history.json")
          base = json.loads(main_p.read_text()) if main_p.exists() else []
          roll = json.loads(pathlib.Path("/tmp/rolling_history.json").read_text())
          by_date = {e["date"]: e for e in base}
          for e in roll:               # rolling branch is the accumulating copy
              by_date[e["date"]] = e
          merged = [by_date[d] for d in sorted(by_date)]
          main_p.write_text(json.dumps(merged, indent=2) + "\n")
          print(f"Seeded {len(merged)} history entries from rolling branch")
          PY
            fi
          fi

      - name: Run recalibration
        run: python scripts/recalibrate.py --update-const

      - name: Check for changes
        id: diff
        run: |
          CHANGED=false
          git diff --quiet custom_components/tracker_predict/const.py || CHANGED=true
          git diff --quiet calibration_history.json 2>/dev/null || CHANGED=true
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Update rolling branch and PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rebuild the rolling branch as exactly "main + one commit", so it
          # never accumulates stale const.py commits or hits rebase conflicts.
          git checkout -B "$ROLLING_BRANCH"
          git add custom_components/tracker_predict/const.py calibration_history.json
          git commit -m "chore: recalibrate per-region defaults $(date +%Y-%m-%d)"
          git push --force-with-lease -u origin "$ROLLING_BRANCH"

          # Create the PR only if one isn't already open for this branch;
          # otherwise the force-push above has already updated it.
          if [ -z "$(gh pr list --head "$ROLLING_BRANCH" --state open --json number --jq '.[].number')" ]; then
            PR_BODY="## Summary
          Rolling automated recalibration of per-region default slope/intercept
          values in \`const.py\`, computed from the latest 90 days of Octopus API
          data.

          This single PR is updated in place on every \`recalibrate\` run and always
          reflects everything not yet on \`main\` — \`const.py\` is regenerated fresh
          each run, and every run's residual statistics and parameter drift deltas
          are accumulated in \`calibration_history.json\`. Merge it whenever you like;
          no snapshots are lost between runs.

          Generated by the \`recalibrate\` workflow."

            gh pr create \
              --base main \
              --head "$ROLLING_BRANCH" \
              --title "Recalibrate per-region defaults (rolling)" \
              --body "$PR_BODY"
          fi
